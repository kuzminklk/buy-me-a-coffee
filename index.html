<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Buy me a coffee!</title>
	<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
	<script type="module" src="script.js"></script>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://scm-history-item:/home/kuzminklk/computer-science/study/technologies/web-3/applications/frontend/cyfrin-updraft/buy-me-a-coffee?%7B%22repositoryId%22%3A%22scm0%22%2C%22historyItemId%22%3A%22scm-graph-outgoing-changes%22%2C%22historyItemParentId%22%3A%225508eb86377716b7b5bc0c088b79ce5a15e3844b%22%2C%22historyItemDisplayId%22%3A%220000000%22%7Dfonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<button class="theme-toggle" id="themeToggle">🌙 Dark</button>

	<main>
		<div class="header">
			<h1>☕ Buy Me a Coffee</h1>
			<p>Support the creator with Ethereum</p>
			<div id="balance" class="balance-display"></div>
		</div>

		<div class="wallet-section">
			<button id="connectButton">Connect Wallet</button>
			<button id="withdrawButton">Withdraw</button>
		</div>

		<form class="fund-form">
			<div class="form-group">
				<label for="etherAmount">How much ETH would you like to send?</label>
				<input 
					type="number" 
					id="etherAmount" 
					value="0.01" 
					step="0.001"
					min="0"
				/>
			</div>
			<button type="button" id="fundButton">Buy a Coffee ☕</button>
		</form>
	</main>
</body>
</html>
