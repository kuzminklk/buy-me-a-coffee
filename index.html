<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Buy me a coffee!</title>
	<script type="module" src="script.js"></script>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main>
		<div class="header">
			<h1>☕ Buy Me a Coffee</h1>
			<p>Support the creator with Ethereum</p>
		</div>

		<div class="wallet-section">
			<button id="connectButton">Connect Wallet</button>
			<div class="button-group">
				<button id="getBalanceButton">Get Balance</button>
				<button id="withdrawButton">Withdraw</button>
			</div>
			<div id="balance"></div>
		</div>

		<form class="fund-form">
			<div class="form-group">
				<label for="etherAmount">How much ETH would you like to send?</label>
				<input 
					type="number" 
					id="etherAmount" 
					value="0.01" 
					step="0.001"
					min="0"
				/>
			</div>
			<button type="button" id="fundButton">Buy a Coffee ☕</button>
		</form>
	</main>
</body>
</html>
